<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - OneConnect CBQA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-page">
    <div class="login-page__media" aria-hidden="true"></div>

    <a class="brand" href="oneconnect.html" aria-label="Back to CBQA Global home">
      <img src="assets/oneconnect/cbqa-logo.png" alt="CBQA Global">
    </a>

    <section class="login-shell" aria-labelledby="forgot-title">
      <div class="login-copy">
        <a class="eyebrow" href="forgot-password.html">Account Recovery</a>
        <h1 id="forgot-title">Reset your password securely</h1>
        <p>Enter your registered email address and we will prepare the next step to help you regain access to OneConnect.</p>
      </div>

      <form class="login-card" id="forgotForm" action="#" method="post">
        <div class="login-card__header">
          <h2>Forgot Password</h2>
          <p>We will use your registered email to verify your account.</p>
        </div>

        <label class="field">
          <span>Email Address</span>
          <input type="email" name="email" placeholder="name@company.com" autocomplete="email" required>
        </label>

        <div class="captcha captcha--single" aria-label="Simple captcha challenge">
          <div class="captcha__question">
            <span>Captcha</span>
            <strong id="forgotCaptchaQuestion">8 + 4 = ?</strong>
          </div>
          <button class="captcha__refresh" type="button" id="forgotRefreshCaptcha" aria-label="Refresh captcha">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.8-4.3L13 11h8V3l-3.3 3.3Z"/>
            </svg>
          </button>
          <label class="captcha__answer">
            <span>Your answer</span>
            <input type="number" inputmode="numeric" id="forgotCaptchaAnswer" placeholder="Result" required>
          </label>
        </div>

        <p class="form-message" id="forgotFormMessage" role="status" aria-live="polite"></p>

        <button class="submit" type="submit">
          <span>Send Reset Instructions</span>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5Zm2 .4V19h14V5.4l-7 6.1-7-6.1Zm1.7-.4 5.3 4.6L17.3 5H6.7Z"/>
          </svg>
        </button>

        <a class="back-link" href="login.html">Back to login</a>
      </form>
    </section>
  </main>

  <script src="forgot-password.js"></script>
</body>
</html>
