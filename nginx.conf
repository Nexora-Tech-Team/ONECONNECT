server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index oneconnect.html;

  location = / {
    try_files /oneconnect.html =404;
  }

  location / {
    try_files $uri $uri/ /oneconnect.html;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public";
  }
}

