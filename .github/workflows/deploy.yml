name: Deploy OneConnect

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            mkdir -p /root/nexora-node/apps
            if [ ! -d /root/nexora-node/apps/oneconnect/.git ]; then
              git clone git@github.com:Nexora-Tech-Team/ONECONNECT.git /root/nexora-node/apps/oneconnect
            fi
            cd /root/nexora-node/apps/oneconnect
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker compose ps
